<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Image Vibe | Professional Image Laboratory</title>
    <meta name="title" content="Image Vibe | Professional Image Laboratory" />
    <meta
      name="description"
      content="Elevate your images with Image Vibe. A high-performance, browser-based laboratory for professional-grade adjustments and surgical precision."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://theseven99.github.io/image-vibe/"
    />
    <meta
      property="og:title"
      content="Image Vibe | Professional Image Laboratory"
    />
    <meta
      property="og:description"
      content="Elevate your images with Image Vibe. Fast, private, and stunningly beautiful image processing in your browser."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://theseven99.github.io/image-vibe/"
    />
    <meta
      property="twitter:title"
      content="Image Vibe | Professional Image Laboratory"
    />
    <meta
      property="twitter:description"
      content="Elevate your images with Image Vibe. Fast, private, and stunningly beautiful image processing in your browser."
    />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #09090b;
        --accent: #2563eb;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: #09090b;
        transition:
          opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 0.8s;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .logo-container {
        position: relative;
        margin-bottom: 2rem;
      }
      .logo-text {
        font-family: "Outfit", sans-serif;
        font-size: 3.5rem;
        font-weight: 900;
        color: white;
        letter-spacing: -0.05em;
        margin: 0;
      }
      .logo-dot {
        color: var(--accent);
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .intro-text {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="logo-container">
        <h1 class="logo-text">IMAGE VIBE<span class="logo-dot">.</span></h1>
      </div>
      <div class="loader"></div>
      <p class="intro-text">Initializing Laboratory</p>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener("load", () => {
        const splash = document.getElementById("splash-screen");
        setTimeout(() => {
          splash.classList.add("fade-out");
        }, 1200);
      });
    </script>
  </body>
</html>
